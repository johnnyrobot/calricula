[pytest]
# Pytest configuration for Calricula backend

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output configuration
# Coverage gate: --cov-fail-under is a ratchet floor set a few points below the
# measured total (~50% as of this change) so regressions below today's level
# fail CI without flaking. Raise the floor as coverage improves.
addopts = -v --tb=short --strict-markers --cov=app --cov-report=term-missing --cov-fail-under=45

# Markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may require database)
    slow: Slow tests that should be run sparingly

# Async mode
asyncio_mode = auto

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
