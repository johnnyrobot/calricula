name: CI

# WS-0 safety net: run the backend test suite and frontend build/unit tests on
# every push and PR. This is the gate the remediation workstreams (WS-1..WS-5)
# verify against. Playwright e2e is intentionally a separate opt-in step (it
# needs browser binaries + a running app) to keep PR feedback fast.

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # The suite talks to Postgres (settings.DATABASE_URL defaults to
    # localhost:5433/calricula). Provide it as a service container; the port is
    # mapped to 5433 to match that default.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: calricula
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/calricula
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Seed reference data
        # The seed-data tests (test_ccn_seed_data, reference endpoints) read
        # pre-seeded rows from the DB. Create the schema and seed only the two
        # dependency-free reference tables — not courses/programs/demo data,
        # which would perturb count-based tests. Both seeders are offline (no AI).
        run: |
          python - <<'PY'
          import app.models  # noqa: F401 -- register all SQLModel tables
          from app.core.database import create_db_and_tables, update_schema_for_lmi
          create_db_and_tables()
          update_schema_for_lmi()
          from seeds.seed_top_codes import seed_top_codes
          from seeds.seed_ccn_standards import seed_ccn_standards
          seed_top_codes()
          seed_ccn_standards()
          print("Seeded TOP codes + CCN standards")
          PY
      - name: Run tests
        run: pytest
      - name: Type check (non-blocking)
        run: mypy app
        continue-on-error: true

  frontend:
    name: Frontend (build + jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
        continue-on-error: true
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test
